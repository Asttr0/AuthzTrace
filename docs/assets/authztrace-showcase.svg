<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" role="img" aria-labelledby="title desc">
  <title id="title">How AuthzTrace finds a BOLA and proves its fix</title>
  <desc id="desc">An ownership contract becomes a cross-user test matrix. A vulnerable response blocks CI, then a denied response proves the authorization fix.</desc>

  <rect width="1000" height="430" rx="12" fill="#161b22"/>
  <rect x="1" y="1" width="998" height="50" rx="11" fill="#0d1117"/>
  <circle cx="25" cy="26" r="5" fill="#f85149"/>
  <circle cx="43" cy="26" r="5" fill="#d29922"/>
  <circle cx="61" cy="26" r="5" fill="#3fb950"/>
  <text x="82" y="32" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">authztrace run -c authztrace.yaml</text>

  <g>
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="1;1;0;0;1" keyTimes="0;0.42;0.50;0.92;1"/>
    <rect x="823" y="12" width="147" height="28" rx="14" fill="#3d1519" stroke="#f85149"/>
    <text x="896" y="31" fill="#ff7b72" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="middle">VULNERABLE API</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.42;0.50;0.92;1"/>
    <rect x="823" y="12" width="147" height="28" rx="14" fill="#102a18" stroke="#3fb950"/>
    <text x="896" y="31" fill="#56d364" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="middle">FIXED API</text>
  </g>

  <rect x="30" y="72" width="286" height="278" rx="8" fill="#0d1117" stroke="#30363d"/>
  <text x="50" y="103" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">1 / OWNERSHIP CONTRACT</text>
  <line x1="50" y1="116" x2="296" y2="116" stroke="#21262d"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">
    <text x="50" y="145" fill="#79c0ff">actors:</text>
    <text x="70" y="171" fill="#c9d1d9">alice: <tspan fill="#a5d6ff">bearer token</tspan></text>
    <text x="70" y="196" fill="#c9d1d9">bob:   <tspan fill="#a5d6ff">bearer token</tspan></text>
    <text x="50" y="229" fill="#79c0ff">invoice ids:</text>
    <text x="70" y="255" fill="#c9d1d9">alice: <tspan fill="#d2a8ff">inv_A</tspan></text>
    <text x="70" y="280" fill="#c9d1d9">bob:   <tspan fill="#d2a8ff">inv_B</tspan></text>
    <text x="50" y="318" fill="#79c0ff">policy: <tspan fill="#56d364">owner-only</tspan></text>
  </g>

  <rect x="337" y="72" width="326" height="278" rx="8" fill="#0d1117" stroke="#30363d"/>
  <text x="357" y="103" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">2 / GENERATED REQUEST MATRIX</text>
  <line x1="357" y1="116" x2="643" y2="116" stroke="#21262d"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12">
    <text x="357" y="141" fill="#8b949e">ACTOR   OBJECT   EXPECT   HTTP</text>
    <text x="357" y="171" fill="#56d364">alice   inv_A    ALLOW    200  PASS</text>
    <g>
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="1;1;0;0;1" keyTimes="0;0.42;0.50;0.92;1"/>
      <rect x="350" y="184" width="300" height="55" rx="5" fill="#3d1519"/>
      <text x="357" y="207" fill="#ff7b72">bob     inv_A    DENY     200  FAIL</text>
      <text x="357" y="229" fill="#ff7b72">leaked marker: "Alice private"</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.42;0.50;0.92;1"/>
      <rect x="350" y="184" width="300" height="55" rx="5" fill="#102a18"/>
      <text x="357" y="207" fill="#56d364">bob     inv_A    DENY     403  PASS</text>
      <text x="357" y="229" fill="#56d364">cross-user request blocked</text>
    </g>
    <text x="357" y="267" fill="#56d364">anon    inv_A    DENY     401  PASS</text>
    <rect x="357" y="295" width="181" height="31" rx="15" fill="#1f2937" stroke="#30363d"/>
    <text x="447" y="315" fill="#c9d1d9" text-anchor="middle">24 checks generated</text>
  </g>

  <rect x="684" y="72" width="286" height="278" rx="8" fill="#0d1117" stroke="#30363d"/>
  <text x="704" y="103" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">3 / CI VERDICT</text>
  <line x1="704" y1="116" x2="950" y2="116" stroke="#21262d"/>
  <g>
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="1;1;0;0;1" keyTimes="0;0.42;0.50;0.92;1"/>
    <circle cx="827" cy="164" r="28" fill="#3d1519" stroke="#f85149" stroke-width="2"/>
    <path d="M816 153l22 22m0-22l-22 22" stroke="#ff7b72" stroke-width="4" stroke-linecap="round"/>
    <text x="827" y="216" fill="#ff7b72" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" text-anchor="middle">BOLA FOUND</text>
    <text x="827" y="245" fill="#c9d1d9" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Bob accessed Alice's invoice</text>
    <text x="827" y="268" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">SARIF finding created</text>
    <rect x="744" y="292" width="166" height="34" rx="17" fill="#3d1519" stroke="#f85149"/>
    <text x="827" y="314" fill="#ff7b72" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" font-weight="700" text-anchor="middle">exit 1 / PR blocked</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.42;0.50;0.92;1"/>
    <circle cx="827" cy="164" r="28" fill="#102a18" stroke="#3fb950" stroke-width="2"/>
    <path d="M814 164l9 9 18-21" fill="none" stroke="#56d364" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="827" y="216" fill="#56d364" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" text-anchor="middle">CONTRACT PROVEN</text>
    <text x="827" y="245" fill="#c9d1d9" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">Bob denied with HTTP 403</text>
    <text x="827" y="268" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">No authorization findings</text>
    <rect x="744" y="292" width="166" height="34" rx="17" fill="#102a18" stroke="#3fb950"/>
    <text x="827" y="314" fill="#56d364" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" font-weight="700" text-anchor="middle">exit 0 / PR ready</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">
    <rect x="91" y="374" width="190" height="30" rx="15" fill="#1f2937"/>
    <text x="186" y="394" fill="#79c0ff" text-anchor="middle">READ-ONLY BY DEFAULT</text>
    <rect x="392" y="374" width="216" height="30" rx="15" fill="#1f2937"/>
    <text x="500" y="394" fill="#d2a8ff" text-anchor="middle">CREDENTIAL PREFLIGHT</text>
    <rect x="719" y="374" width="190" height="30" rx="15" fill="#1f2937"/>
    <text x="814" y="394" fill="#56d364" text-anchor="middle">SARIF / JSON / JUNIT</text>
  </g>
  <line x1="70" y1="418" x2="930" y2="418" stroke="#30363d"/>
  <circle cx="70" cy="418" r="4" fill="#58a6ff">
    <animate attributeName="cx" dur="8s" repeatCount="indefinite" values="70;500;930;70" keyTimes="0;0.45;0.92;1"/>
  </circle>
</svg>
